services:
  glide-server:
    build: .
    ports:
      - "8080:8080"
      - "5353:5353/udp"
    environment:
      - GLIDE_DATA_DIR=/data
      - GLIDE_MAX_STORAGE_BYTES=1073741824
      - GLIDE_RETENTION_DAYS=30
      - GLIDE_MAX_ITEM_BYTES=10485760
      - GLIDE_PUBLIC_URL=${GLIDE_PUBLIC_URL:-http://localhost:8080}
      - GLIDE_ADMIN_TOKEN=${GLIDE_ADMIN_TOKEN:-}
      - GLIDE_REGISTRATION_TOKEN=${GLIDE_REGISTRATION_TOKEN:-}
      - GLIDE_TEMP_TOKEN_DEFAULT_TTL=${GLIDE_TEMP_TOKEN_DEFAULT_TTL:-3600}
      - GLIDE_INPUT_RELAY_ENABLED=${GLIDE_INPUT_RELAY_ENABLED:-false}
      - GLIDE_INPUT_RELAY_MAX_LATENCY_MS=${GLIDE_INPUT_RELAY_MAX_LATENCY_MS:-200}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - glide-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  glide-data:
