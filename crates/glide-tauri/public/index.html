<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide - 剪贴板同步</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#eee;height:100vh;overflow:hidden}
        .container{max-width:340px;margin:0 auto;padding:16px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #333}
        .header h1{font-size:18px;color:#00d4ff}
        .version{font-size:11px;color:#666}
        .status-bar{display:flex;align-items:center;gap:8px;padding:12px;background:#16213e;border-radius:8px;margin:12px 0}
        .status-dot{width:10px;height:10px;border-radius:50%}
        .status-dot.connected{background:#00ff88;box-shadow:0 0 8px #00ff88}
        .status-dot.connecting{background:#ffaa00;animation:pulse 1s infinite}
        .status-dot.disconnected{background:#ff4444}
        .status-text{font-size:13px}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .server-input{display:flex;gap:8px;margin:8px 0}
        .server-input input{flex:1;padding:8px 12px;background:#16213e;border:1px solid #333;border-radius:6px;color:#eee;font-size:12px}
        .server-input input:focus{outline:none;border-color:#00d4ff}
        .server-input button{padding:8px 16px;background:#00d4ff;border:none;border-radius:6px;color:#1a1a2e;font-weight:bold;cursor:pointer;font-size:12px}
        .controls{display:flex;gap:8px;margin:12px 0}
        .toggle-btn{flex:1;padding:10px;border-radius:8px;border:1px solid #333;background:#16213e;color:#eee;cursor:pointer;font-size:12px;text-align:center;transition:all .2s}
        .toggle-btn:hover{border-color:#00d4ff}
        .toggle-btn.active{background:#00d4ff;color:#1a1a2e;border-color:#00d4ff}
        .section{margin:16px 0}
        .section-title{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .history-list,.device-list{max-height:160px;overflow-y:auto}
        .history-item{padding:8px 12px;background:#16213e;border-radius:6px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
        .history-item .kind{padding:2px 6px;border-radius:4px;font-size:10px}
        .kind.text{background:#2d5a3d;color:#88ff88}
        .kind.image{background:#5a3d2d;color:#ff8888}
        .kind.file{background:#2d3d5a;color:#8888ff}
        .history-item .preview{color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
        .device-item{padding:8px 12px;background:#16213e;border-radius:6px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
        .device-item .status{width:8px;height:8px;border-radius:50%}
        .device-item .status.online{background:#00ff88}
        .device-item .status.offline{background:#666}
        .settings-group{background:#16213e;border-radius:8px;padding:12px}
        .setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222}
        .setting-row:last-child{border-bottom:none}
        .setting-label{font-size:13px}
        .switch{position:relative;width:40px;height:20px}
        .switch input{opacity:0;width:0;height:0}
        .switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;transition:.3s;border-radius:20px}
        .switch .slider:before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#eee;transition:.3s;border-radius:50%}
        .switch input:checked+.slider{background:#00d4ff}
        .switch input:checked+.slider:before{transform:translateX(20px)}
        .empty{text-align:center;color:#666;padding:24px;font-size:13px}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Glide</h1>
            <span class="version" id="version">v0.1.0</span>
        </div>
        <div class="status-bar">
            <div class="status-dot disconnected" id="statusDot"></div>
            <span class="status-text" id="statusText">未连接</span>
        </div>
        <div class="server-input">
            <input type="text" id="serverUrl" placeholder="服务器地址 (如 http://localhost:8080)" />
            <button onclick="connect()">连接</button>
        </div>
        <div class="controls">
            <button class="toggle-btn" id="pauseBtn" onclick="togglePause()">⏸ 暂停同步</button>
            <button class="toggle-btn" id="inputBtn" onclick="toggleInput()">🖱️ 键鼠共享</button>
        </div>
        <div class="section">
            <div class="section-title">剪贴板历史</div>
            <div class="history-list" id="historyList">
                <div class="empty">连接服务器后显示剪贴板历史</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">已连接设备</div>
            <div class="device-list" id="deviceList">
                <div class="empty">连接服务器后显示设备列表</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">同步策略</div>
            <div class="settings-group">
                <div class="setting-row">
                    <span class="setting-label">文本同步</span>
                    <label class="switch"><input type="checkbox" id="syncText" checked onchange="updatePolicy('text',this.checked)"/><span class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <span class="setting-label">图片同步</span>
                    <label class="switch"><input type="checkbox" id="syncImage" checked onchange="updatePolicy('image',this.checked)"/><span class="slider"></span></label>
                </div>
                <div class="setting-row">
                    <span class="setting-label">文件同步</span>
                    <label class="switch"><input type="checkbox" id="syncFile" checked onchange="updatePolicy('file',this.checked)"/><span class="slider"></span></label>
                </div>
            </div>
        </div>
    </div>
    <script>
        const{invoke}=window.__TAURI__.tauri;
        async function loadState(){
            const version=await invoke('get_version');
            document.getElementById('version').textContent='v'+version;
            const serverUrl=await invoke('get_server_url');
            if(serverUrl)document.getElementById('serverUrl').value=serverUrl;
            const paused=await invoke('get_sync_paused');
            updatePauseButton(paused);
            const inputEnabled=await invoke('get_input_sharing_enabled');
            updateInputButton(inputEnabled);
            updateStatus(await invoke('get_connection_status'));
        }
        async function connect(){
            const url=document.getElementById('serverUrl').value;
            if(!url)return;
            if(await invoke('set_server_url',{url})){
                updateStatus('connecting');
                setTimeout(()=>updateStatus('connected'),1000);
            }
        }
        async function togglePause(){updatePauseButton(await invoke('toggle_sync_pause'))}
        function updatePauseButton(p){const b=document.getElementById('pauseBtn');b.textContent=p?'▶ 恢复同步':'⏸ 暂停同步';b.classList.toggle('active',p)}
        async function toggleInput(){updateInputButton(await invoke('toggle_input_sharing'))}
        function updateInputButton(e){document.getElementById('inputBtn').classList.toggle('active',e)}
        function updateStatus(s){
            const d=document.getElementById('statusDot'),t=document.getElementById('statusText');
            d.className='status-dot '+s;
            t.textContent={connected:'已连接',connecting:'连接中...'}[s]||'未连接';
        }
        async function updatePolicy(kind,enabled){await invoke('set_type_policy',{kind,syncEnabled:enabled,maxSize:null})}
        setInterval(async()=>updateStatus(await invoke('get_connection_status')),5000);
        loadState();
    </script>
</body>
</html>
