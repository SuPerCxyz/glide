name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Build & Test on Linux ---
  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings 2>&1 || cargo clippy --workspace -- -A deprecated -A dead_code -A unused 2>&1 || true

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  # --- Build Docker Image ---
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: glide-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          docker images glide-server:latest
          docker run --rm --entrypoint /usr/local/bin/glide-server glide-server:latest --help 2>/dev/null || echo "Binary exists in image"

  # --- Native Windows Build ---
  build-windows-native:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-win-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-win-cargo-

      - name: Build glide-core
        run: cargo build --package glide-core --verbose

      - name: Test glide-core
        run: cargo test --package glide-core --verbose

      - name: Build glide-server
        run: cargo build --package glide-server --verbose

      - name: Build glide-cli
        run: cargo build --package glide-cli --verbose

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/debug/glide-cli.exe
            target/debug/glide-server.exe
          retention-days: 30

  # --- Package Linux (deb) ---
  package-linux:
    name: Package Linux (deb)
    runs-on: ubuntu-latest
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Create .deb package for glide-cli
        run: |
          mkdir -p dist
          CLI_DIR="glide-cli_0.1.0_amd64"
          mkdir -p "$CLI_DIR/DEBIAN"
          mkdir -p "$CLI_DIR/usr/bin"
          cat > "$CLI_DIR/DEBIAN/control" <<EOF
          Package: glide-cli
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: SuPerC <superc@soocoo.xyz>
          Description: LAN-first clipboard sync CLI tool
           Glide is a cross-node clipboard synchronization tool.
          EOF
          cp target/release/glide-cli "$CLI_DIR/usr/bin/glide"
          dpkg-deb --build "$CLI_DIR" dist/

      - name: Create .deb package for glide-server
        run: |
          SERVER_DIR="glide-server_0.1.0_amd64"
          mkdir -p "$SERVER_DIR/DEBIAN"
          mkdir -p "$SERVER_DIR/usr/bin"
          mkdir -p "$SERVER_DIR/etc/glide"
          cat > "$SERVER_DIR/DEBIAN/control" <<EOF
          Package: glide-server
          Version: 0.1.0
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: SuPerC <superc@soocoo.xyz>
          Description: LAN-first clipboard sync server
          EOF
          cp target/release/glide-server "$SERVER_DIR/usr/bin/glide-server"
          dpkg-deb --build "$SERVER_DIR" dist/

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*.deb
          retention-days: 30
