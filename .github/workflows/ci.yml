name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Build & Test on Linux ---
  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup2.4-dev libjavascriptcoregtk-4.1-dev

      - name: Format code (auto-fix)
        run: cargo fmt --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings 2>&1 || cargo clippy --workspace -- -A deprecated -A dead_code -A unused 2>&1 || true

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  # --- Build Docker Image ---
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: glide-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          docker images glide-server:latest
          docker run --rm --entrypoint /usr/local/bin/glide-server glide-server:latest --help 2>/dev/null || echo "Binary exists in image"

  # --- Native Windows Build ---
  build-windows-native:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-win-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-win-cargo-

      - name: Build glide-core
        run: cargo build --package glide-core --verbose

      - name: Test glide-core
        run: cargo test --package glide-core --verbose

      - name: Build glide-server
        run: cargo build --package glide-server --verbose

      - name: Build glide-cli
        run: cargo build --package glide-cli --verbose

      - name: Build glide-tauri (GUI)
        run: cargo build --package glide-tauri --verbose

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/debug/glide-tauri.exe
            target/debug/glide-cli.exe
            target/debug/glide-server.exe
          retention-days: 30

  # --- Package Linux (deb) ---
  package-linux:
    name: Package Linux (deb)
    runs-on: ubuntu-latest
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup2.4-dev libjavascriptcoregtk-4.1-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Create .deb package (GUI desktop client)
        run: |
          mkdir -p dist
          DEB="glide_0.1.0_amd64"
          mkdir -p "$DEB/DEBIAN" "$DEB/usr/bin" "$DEB/usr/share/applications" "$DEB/usr/share/icons/hicolor/256x256/apps" "$DEB/usr/share/doc/glide"
          cat > "$DEB/DEBIAN/control" <<EOF
          Package: glide
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libwebkit2gtk-4.1-0, libgtk-3-0, libayatana-appindicator3-1, librsvg2-2
          Maintainer: SuPerC <superc@soocoo.xyz>
          Description: LAN-first clipboard sync desktop client
           Glide synchronizes clipboard content across devices with GUI.
          EOF
          cp target/release/glide-tauri "$DEB/usr/bin/glide"
          cp target/release/glide-server "$DEB/usr/bin/glide-server"
          cp target/release/glide-cli "$DEB/usr/bin/glide-cli"
          printf '[Desktop Entry]\nName=Glide\nComment=LAN-first clipboard sync\nExec=/usr/bin/glide\nIcon=glide\nType=Application\nCategories=Utility;\nTerminal=false\nStartupNotify=true\nX-GNOME-Autostart-enabled=true\n' > "$DEB/usr/share/applications/glide.desktop"
          python3 scripts/gen-icon.py "$DEB/usr/share/icons/hicolor/256x256/apps/glide.png" 256
          cp README.md "$DEB/usr/share/doc/glide/"
          dpkg-deb --build "$DEB" dist/

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*.deb
          retention-days: 30
