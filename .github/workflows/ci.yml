name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Build & Test on Linux ---
  test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Format code (auto-fix)
        run: cargo fmt --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings 2>&1 || cargo clippy --workspace -- -A deprecated -A dead_code -A unused 2>&1 || true

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Prepare Linux artifacts with README
        run: |
          mkdir -p linux-artifacts
          cat > linux-artifacts/README.txt << 'EOF'
Glide - LAN-first clipboard sync

Desktop GUI:
  ./glide-gui           Launch GUI
  ./glide-gui --smoke   Smoke test

CLI:
  ./glide-cli copy "text"   Copy clipboard
  ./glide-cli paste         Paste clipboard
  ./glide-cli devices       List devices
  ./glide-server            Start relay server

Environment:
  GLIDE_DEVICE_ID, GLIDE_DEVICE_NAME, GLIDE_LAN_SYNC_PORT
EOF

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/debug/glide-gui
            target/debug/glide-cli
            target/debug/glide-server
            linux-artifacts/README.txt
          if-no-files-found: warn
          retention-days: 30

  # --- Verify Docker Image ---
  build-docker:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-docker-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-docker-

      - name: Build server + CLI binaries
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Docker image (runtime only, no compilation)
        run: docker build -t glide-server:latest .

      - name: Verify
        run: |
          docker rm -f glide-server-verify >/dev/null 2>&1 || true
          docker run -d --name glide-server-verify \
            -p 18080:8080 \
            -e GLIDE_DATA_DIR=/tmp/glide-data \
            glide-server:latest
          sleep 10
          if curl -fsS http://127.0.0.1:18080/ >/dev/null; then
            docker rm -f glide-server-verify
            exit 0
          fi
          docker logs glide-server-verify
          docker rm -f glide-server-verify
          exit 1

  # --- Linux installable packages for CI downloads ---
  linux-packages:
    name: Linux Packages
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev fuse libfuse2 \
            desktop-file-utils curl rpm

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-linux-package-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-linux-package-

      - name: Build Slint GUI, daemon, server and CLI
        run: cargo build --release --package glide-gui --package glide-daemon --package glide-server --package glide-cli

      - name: Collect Linux packages
        run: |
          VERSION="0.1.0" ./scripts/package-linux.sh
          test -n "$(find dist -name '*.deb' -print -quit)"
          test -n "$(find dist -name '*.rpm' -print -quit)"
          test -n "$(find dist -name '*.AppImage' -print -quit)"
          cat > dist/README.txt << 'EOF'
Glide Linux Packages

  glide_0.1.0_amd64.deb     Debian/Ubuntu:  sudo dpkg -i glide_0.1.0_amd64.deb
  glide-0.1.0-1.x86_64.rpm  Fedora/RHEL:    sudo rpm -ivh glide-0.1.0-1.x86_64.rpm
  glide-0.1.0-x86_64.AppImage               chmod +x *.AppImage && ./glide-0.1.0-x86_64.AppImage

After install, run:
  glide-gui     Launch GUI
  glide-cli     CLI client
  glide-server  Start relay server
EOF

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          retention-days: 30

  # --- Native Windows Build ---
  build-windows-native:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-win-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-win-cargo-

      - name: Build glide-core
        run: cargo build --package glide-core --verbose

      - name: Test glide-core
        run: cargo test --package glide-core --verbose

      - name: Build glide-server
        run: cargo build --package glide-server --verbose

      - name: Build glide-cli
        run: cargo build --package glide-cli --verbose

      - name: Build glide-daemon
        run: cargo build --package glide-daemon --verbose

      - name: Build glide-gui (Slint GUI)
        run: cargo build --package glide-gui --verbose

      - name: Smoke test glide-gui diagnostics
        shell: pwsh
        run: |
          function Invoke-GlideGuiSmoke {
            param(
              [string]$Mode,
              [string]$FailureMessage
            )

            $suffix = $Mode.Replace("--", "")
            $stdout = Join-Path $env:RUNNER_TEMP "glide-gui-$suffix.out"
            $stderr = Join-Path $env:RUNNER_TEMP "glide-gui-$suffix.err"
            $process = Start-Process -FilePath "target\debug\glide-gui.exe" `
              -ArgumentList $Mode `
              -Wait `
              -PassThru `
              -RedirectStandardOutput $stdout `
              -RedirectStandardError $stderr
            if (Test-Path $stdout) {
              Get-Content $stdout
            }
            if (Test-Path $stderr) {
              Get-Content $stderr
            }
            if ($process.ExitCode -ne 0) {
              throw "$FailureMessage with exit code $($process.ExitCode)"
            }
          }

          $env:GLIDE_GUI_LOG = Join-Path $env:RUNNER_TEMP "glide-gui-smoke.log"
          Invoke-GlideGuiSmoke "--smoke" "glide-gui smoke failed"
          if (-not (Test-Path $env:GLIDE_GUI_LOG)) {
            throw "glide-gui did not create diagnostics log: $env:GLIDE_GUI_LOG"
          }
          Invoke-GlideGuiSmoke "--interaction-smoke" "glide-gui interaction smoke failed"
          Get-Content $env:GLIDE_GUI_LOG

      - name: Prepare Windows artifacts with README
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows-artifacts\gui
          New-Item -ItemType Directory -Force -Path windows-artifacts\cli

          # Copy binaries to flat directories
          Copy-Item target\debug\glide-gui.exe windows-artifacts\gui\
          Copy-Item target\debug\glide-cli.exe windows-artifacts\cli\
          Copy-Item target\debug\glide-server.exe windows-artifacts\cli\
          Copy-Item target\debug\glide-daemon.exe windows-artifacts\cli\
          Copy-Item ${{ runner.temp }}\glide-gui-smoke.log windows-artifacts\gui\

          # Add README
          @"
Glide - LAN-first clipboard sync

Usage:
  glide-gui.exe            Launch the GUI (no install needed)
  glide-gui.exe --smoke    Run smoke test

CLI tools:
  glide-cli.exe --help
  glide-server.exe --help
  glide-daemon.exe --help

Windows requirements: None (portable, no WebView2 dependency)
"@ | Out-File -FilePath windows-artifacts\gui\README.txt -Encoding UTF8

          @"
Glide CLI Tools

glide-cli.exe     CLI client for clipboard sync
  glide-cli.exe copy "text"
  glide-cli.exe paste
  glide-cli.exe devices

glide-server.exe  Central relay server
  glide-server.exe

glide-daemon.exe  Background daemon (LAN discovery + sync)
  glide-daemon.exe --print-status

Environment variables:
  GLIDE_SERVER_URL, GLIDE_DEVICE_ID, GLIDE_DEVICE_NAME
"@ | Out-File -FilePath windows-artifacts\cli\README.txt -Encoding UTF8

      - name: Upload Windows GUI
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: windows-artifacts/gui/*
          retention-days: 30

      - name: Upload Windows CLI tools
        uses: actions/upload-artifact@v4
        with:
          name: windows-cli
          path: windows-artifacts/cli/*
          retention-days: 30
