name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      build_linux:
        description: 'Build Linux packages'
        required: false
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows packages'
        required: false
        type: boolean
        default: false
      build_docker:
        description: 'Build Docker image'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Linux: Build Slint GUI packages ---
  linux-packages:
    name: Linux Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev fuse libfuse2 \
            desktop-file-utils curl rpm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-slint-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-slint-release-

      - name: Build Slint GUI, daemon, server and CLI
        run: cargo build --release --package glide-gui --package glide-daemon --package glide-server --package glide-cli

      - name: Build Slint desktop packages (.deb + .rpm + .AppImage)
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          VERSION="$VERSION" ./scripts/package-linux.sh
          test -n "$(find dist -name '*.deb' -print -quit)"
          test -n "$(find dist -name '*.rpm' -print -quit)"
          test -n "$(find dist -name '*.AppImage' -print -quit)"

      - name: Collect Linux packages
        run: |
          mkdir -p dist
          cp target/release/glide-server dist/
          cp target/release/glide-daemon dist/
          cp target/release/glide-cli dist/
        shell: bash

      - name: Verify .deb package in Docker
        run: |
          DEB=$(find dist -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then echo "No deb found"; exit 1; fi
          mkdir -p /tmp/verify
          cp "$DEB" /tmp/verify/glide.deb
          cat > /tmp/verify/Dockerfile <<'DEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y \
              libfontconfig1 libfreetype6 libxkbcommon0 libxkbcommon-x11-0 \
              libxcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0 \
              xvfb dbus-x11 file \
              && rm -rf /var/lib/apt/lists/*
          COPY glide.deb /tmp/glide.deb
          RUN dpkg -i /tmp/glide.deb && rm /tmp/glide.deb
          RUN file /usr/bin/glide-gui
          CMD xvfb-run --auto-servernum timeout 5 /usr/bin/glide-gui || echo "GUI smoke completed"
          DEOF
          cd /tmp/verify && docker build -t glide-verify . && docker run --rm glide-verify

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          retention-days: 90

  # --- Windows: Build Slint GUI desktop client ---
  windows-packages:
    name: Windows Packages
    runs-on: windows-latest
    timeout-minutes: 35
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-slint-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-slint-release-

      - name: Build Slint GUI, daemon, server and CLI
        run: cargo build --release --package glide-gui --package glide-daemon --package glide-server --package glide-cli

      - name: Smoke test release glide-gui diagnostics
        shell: pwsh
        run: |
          function Invoke-GlideGuiSmoke {
            param(
              [string]$Mode,
              [string]$FailureMessage
            )

            & target\release\glide-gui.exe $Mode
            $commandSucceeded = $?
            $exitCode = $LASTEXITCODE
            if (-not $commandSucceeded -or ($null -ne $exitCode -and $exitCode -ne 0)) {
              throw "$FailureMessage with exit code $exitCode"
            }
          }

          $env:GLIDE_GUI_LOG = Join-Path $env:RUNNER_TEMP "glide-gui-release-smoke.log"
          Invoke-GlideGuiSmoke "--smoke" "glide-gui release smoke failed"
          if (-not (Test-Path $env:GLIDE_GUI_LOG)) {
            throw "glide-gui did not create diagnostics log: $env:GLIDE_GUI_LOG"
          }
          Invoke-GlideGuiSmoke "--interaction-smoke" "glide-gui interaction smoke failed"
          Get-Content $env:GLIDE_GUI_LOG

      - name: Collect Windows packages
        run: |
          rm -rf dist
          mkdir -p dist
          cp target/release/glide-server.exe dist/
          cp target/release/glide-cli.exe dist/
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p "dist/glide-${VERSION}-windows-portable"
          cp target/release/glide-gui.exe "dist/glide-${VERSION}-windows-portable/glide.exe"
          cp target/release/glide-gui.exe "dist/glide-${VERSION}-windows-portable/glide-gui.exe"
          cp target/release/glide-daemon.exe "dist/glide-${VERSION}-windows-portable/"
          cp target/release/glide-server.exe "dist/glide-${VERSION}-windows-portable/"
          cp target/release/glide-cli.exe "dist/glide-${VERSION}-windows-portable/"
          cp README.md "dist/glide-${VERSION}-windows-portable/"
          test -f "dist/glide-${VERSION}-windows-portable/glide.exe"
          test -f "dist/glide-${VERSION}-windows-portable/glide-gui.exe"
          if find dist -iname '*setup.exe' -o -iname '*.msi' | grep -q .; then
            echo "Unexpected installer artifact found in Slint release dist"
            find dist -iname '*setup.exe' -o -iname '*.msi'
            exit 1
          fi
          cd dist && 7z a "glide-${VERSION}-windows-portable.zip" "glide-${VERSION}-windows-portable/"
        shell: bash

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*
          retention-days: 90

      - name: Upload Windows GUI diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-diagnostics
          path: ${{ runner.temp }}/glide-gui-release-smoke.log
          retention-days: 90

  # --- Docker: Build runtime image from pre-built binaries ---
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch' || inputs.build_docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build server + CLI binaries
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Docker image (runtime only)
        run: docker build -t glide-server:dev-latest .

      - name: Verify Docker image
        run: |
          docker rm -f glide-server-verify >/dev/null 2>&1 || true
          docker run -d --name glide-server-verify \
            -p 18080:8080 \
            -e GLIDE_DATA_DIR=/tmp/glide-data \
            glide-server:dev-latest
          sleep 10
          if curl -fsS http://127.0.0.1:18080/ >/dev/null; then
            docker rm -f glide-server-verify
            exit 0
          fi
          docker logs glide-server-verify
          docker rm -f glide-server-verify
          exit 1

  # --- Create GitHub Release ---
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-packages, windows-packages, docker-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/linux/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
            dist/windows/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
