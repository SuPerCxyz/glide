name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Linux: Build using cargo-tauri for proper installers ---
  linux-packages:
    name: Linux Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup2.4-dev libjavascriptcoregtk-4.1-dev \
            fuse libfuse2 desktop-file-utils rpm

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-release-

      - name: Build server and CLI
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Tauri desktop client (deb + AppImage)
        run: cargo tauri build
        working-directory: crates/glide-tauri

      - name: Collect Linux packages
        run: |
          mkdir -p dist
          # Tauri outputs deb/appimage to target/release/bundle/
          find target/release/bundle -name "*.deb" -o -name "*.AppImage" | while read f; do
            cp "$f" dist/
          done
          # Copy server and CLI binaries
          cp target/release/glide-server dist/
          cp target/release/glide-cli dist/
        shell: bash

      - name: Verify .deb package in Docker
        run: |
          DEB=$(find dist -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then echo "No deb found"; exit 1; fi
          mkdir -p /tmp/verify
          cp "$DEB" /tmp/verify/glide.deb
          cat > /tmp/verify/Dockerfile <<'DEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y \
              libwebkit2gtk-4.1-0 libgtk-3-0 libayatana-appindicator3-1 \
              librsvg2-2 xvfb dbus-x11 file \
              && rm -rf /var/lib/apt/lists/*
          COPY glide.deb /tmp/glide.deb
          RUN dpkg -i /tmp/glide.deb && rm /tmp/glide.deb
          RUN file /usr/bin/glide || file /usr/local/bin/glide || true
          CMD xvfb-run --auto-servernum timeout 5 /usr/bin/glide || xvfb-run --auto-servernum timeout 5 /usr/local/bin/glide || echo "GUI test done"
          DEOF
          cd /tmp/verify && docker build -t glide-verify . && docker run --rm glide-verify

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          retention-days: 90

  # --- Windows: Build GUI desktop client using cargo-tauri ---
  windows-packages:
    name: Windows Packages
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-release-

      - name: Build server and CLI
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Tauri installer (NSIS + MSI)
        run: cargo tauri build
        working-directory: crates/glide-tauri

      - name: Collect Windows packages
        run: |
          mkdir -p dist
          # Tauri outputs to target/release/bundle/
          find target/release/bundle -name "*.exe" -o -name "*.msi" -o -name "*.nsis" | while read f; do
            cp "$f" dist/
          done
          # Copy standalone binaries
          cp target/release/glide-server.exe dist/
          cp target/release/glide-cli.exe dist/
          # Create zip with all binaries
          VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          mkdir -p "dist/glide-${VERSION}-windows"
          cp target/release/glide-server.exe "dist/glide-${VERSION}-windows/"
          cp target/release/glide-cli.exe "dist/glide-${VERSION}-windows/"
          find target/release/bundle -name "*.exe" | head -1 | xargs -I{} cp {} "dist/glide-${VERSION}-windows/glide.exe"
          cp README.md "dist/glide-${VERSION}-windows/"
          7z a "dist/glide-${VERSION}-windows.zip" "dist/glide-${VERSION}-windows/"
        shell: bash

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*
          retention-days: 90

  # --- Docker: Build and push server image ---
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/glide-server
          tags: |
            type=raw,value=dev-latest
            type=raw,value={{date 'YYYYMMDDHHmm'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          docker images glide-server
          docker run --rm superc/glide-server:dev-latest /usr/local/bin/glide-server --help 2>/dev/null || echo "Server binary OK"

  # --- Create GitHub Release ---
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-packages, windows-packages, docker-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/linux/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
            dist/windows/*.zip
            dist/windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
