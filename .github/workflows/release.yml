name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      build_linux:
        description: 'Build Linux packages'
        required: false
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows packages'
        required: false
        type: boolean
        default: false
      build_docker:
        description: 'Build Docker image'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Linux: Build using cargo-tauri for proper installers ---
  linux-packages:
    name: Linux Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || inputs.build_linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup2.4-dev libjavascriptcoregtk-4.1-dev \
            fuse libfuse2 desktop-file-utils rpm

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-release-

      - name: Build server and CLI
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Tauri desktop client (deb + AppImage)
        run: cargo tauri build --bundles deb,appimage
        working-directory: crates/glide-tauri

      - name: Collect Linux packages
        run: |
          mkdir -p dist
          # Tauri outputs deb/appimage to target/release/bundle/
          find target/release/bundle -name "*.deb" -o -name "*.AppImage" | while read f; do
            cp "$f" dist/
          done
          # Copy server and CLI binaries
          cp target/release/glide-server dist/
          cp target/release/glide-cli dist/
        shell: bash

      - name: Verify .deb package in Docker
        run: |
          DEB=$(find dist -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then echo "No deb found"; exit 1; fi
          mkdir -p /tmp/verify
          cp "$DEB" /tmp/verify/glide.deb
          cat > /tmp/verify/Dockerfile <<'DEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y \
              libwebkit2gtk-4.1-0 libgtk-3-0 libayatana-appindicator3-1 \
              librsvg2-2 xvfb dbus-x11 file \
              && rm -rf /var/lib/apt/lists/*
          COPY glide.deb /tmp/glide.deb
          RUN dpkg -i /tmp/glide.deb && rm /tmp/glide.deb
          RUN file /usr/bin/glide || file /usr/local/bin/glide || true
          CMD xvfb-run --auto-servernum timeout 5 /usr/bin/glide || xvfb-run --auto-servernum timeout 5 /usr/local/bin/glide || echo "GUI test done"
          DEOF
          cd /tmp/verify && docker build -t glide-verify . && docker run --rm glide-verify

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          retention-days: 90

  # --- Windows: Build GUI desktop client using cargo-tauri ---
  windows-packages:
    name: Windows Packages
    runs-on: windows-latest
    timeout-minutes: 35
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-release-

      - name: Build server and CLI
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Tauri installer (NSIS + MSI)
        run: cargo tauri build --bundles nsis,msi
        working-directory: crates/glide-tauri

      - name: Collect Windows packages
        run: |
          mkdir -p dist
          # Tauri outputs to target/release/bundle/
          find target/release/bundle -name "*.exe" -o -name "*.msi" -o -name "*.nsis" | while read f; do
            cp "$f" dist/
          done
          # Copy standalone binaries
          cp target/release/glide-server.exe dist/
          cp target/release/glide-cli.exe dist/
          # Create zip with all binaries
          VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          mkdir -p "dist/glide-${VERSION}-windows"
          cp target/release/glide-tauri.exe "dist/glide-${VERSION}-windows/glide.exe"
          cp target/release/glide-server.exe "dist/glide-${VERSION}-windows/"
          cp target/release/glide-cli.exe "dist/glide-${VERSION}-windows/"
          cp README.md "dist/glide-${VERSION}-windows/"
          7z a "dist/glide-${VERSION}-windows.zip" "dist/glide-${VERSION}-windows/"
        shell: bash

      - name: Check Windows package dependencies
        run: |
          $VERSION = "${{ github.event.inputs.version || '0.1.0' }}"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-windows-package-deps.ps1 `
            -InstallDir "dist/glide-${VERSION}-windows" `
            -MainExe "glide.exe" `
            -RequireWebView2OfflineInstaller `
            -BundleRoot "target/release/bundle"
        shell: pwsh

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*
          retention-days: 90

  # --- Docker: Build runtime image from pre-built binaries ---
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch' || inputs.build_docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build server + CLI binaries
        run: cargo build --release --package glide-server --package glide-cli

      - name: Build Docker image (runtime only)
        run: docker build -t glide-server:dev-latest .

      - name: Verify Docker image
        run: |
          docker rm -f glide-server-verify >/dev/null 2>&1 || true
          docker run -d --name glide-server-verify \
            -p 18080:8080 \
            -e GLIDE_DATA_DIR=/tmp/glide-data \
            glide-server:dev-latest
          sleep 10
          if curl -fsS http://127.0.0.1:18080/ >/dev/null; then
            docker rm -f glide-server-verify
            exit 0
          fi
          docker logs glide-server-verify
          docker rm -f glide-server-verify
          exit 1

  # --- Create GitHub Release ---
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-packages, windows-packages, docker-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/linux/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: dist/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
            dist/windows/*.zip
            dist/windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
